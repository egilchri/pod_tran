
    <!DOCTYPE html>
    <html lang="sv">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Episode 724 - March 18 2026</title>
        <style>
            :root { --primary: #004a99; --accent: #ffc107; --bg: #f0f2f5; }
            body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); }
            .header-box { position: sticky; top: 0; background: rgba(255,255,255,0.98); padding: 15px; border-bottom: 3px solid var(--primary); z-index: 100; backdrop-filter: blur(10px); }
            .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; background: #eee; padding: 12px; border-radius: 15px; }
            .audio-row { display: flex; gap: 10px; align-items: center; }
            audio { flex-grow: 1; height: 40px; }
            .speed-row { display: flex; gap: 5px; align-items: center; justify-content: center; border-top: 1px solid #ccc; padding-top: 8px; }
            .btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
            .btn.active { background: var(--accent); color: black; }
            .speed-btn { background: #fff; color: #333; border: 1px solid #ccc; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer; }
            .speed-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
            .transcript { padding: 20px; max-width: 900px; margin: 0 auto; }
            .row { display: flex; gap: 20px; padding: 15px; margin-bottom: 12px; background: white; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; }
            .row.highlight { background: #fffde7; border-left: 8px solid var(--accent); transition: background 0.3s ease; }
            .orig { flex: 1; color: var(--primary); font-weight: 700; font-size: 1.1rem; }
            .en { flex: 1; color: #546e7a; font-style: italic; border-left: 1px solid #eee; padding-left: 15px; font-size: 1.1rem; }
            .status-badge { font-size: 0.7rem; margin-left: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
            .vocab-row { display: flex; align-items: center; gap: 8px; border-top: 1px solid #ccc; padding-top: 8px; }
            #vocabPanel { display: none; margin-top: 8px; border-top: 1px solid #ccc; padding-top: 8px; }
            .vocab-pos-filters { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
            .pos-btn { background: #e0e0e0; color: #333; border: none; padding: 3px 9px; border-radius: 10px; font-size: 0.68rem; cursor: pointer; }
            .pos-btn.active { background: var(--primary); color: white; }
            #vocab-info {
                min-height: 52px; padding: 8px 10px; background: #f5f5f5;
                border-radius: 8px; margin-bottom: 6px; font-size: 0.82rem;
                display: flex; flex-direction: column; justify-content: center; gap: 2px;
            }
            #vocab-info .info-cognate { font-size: 0.95rem; font-weight: bold; color: #1565c0; }
            #vocab-info .info-sub { color: #666; font-size: 0.75rem; }
            .vocab-picker-wrap { position: relative; }
            .vocab-picker-line {
                position: absolute; top: 50%; transform: translateY(-50%);
                left: 0; right: 0; height: 34px; pointer-events: none;
                border-top: 1px solid rgba(0,74,153,0.35);
                border-bottom: 1px solid rgba(0,74,153,0.35);
                background: rgba(0,74,153,0.05);
            }
            #vocab-picker {
                height: 170px; overflow-y: scroll; scroll-snap-type: y mandatory;
                scrollbar-width: none;
                -webkit-mask-image: linear-gradient(transparent 0%, black 22%, black 78%, transparent 100%);
                mask-image: linear-gradient(transparent 0%, black 22%, black 78%, transparent 100%);
            }
            #vocab-picker::-webkit-scrollbar { display: none; }
            .vp-spacer { height: 68px; }
            .vp-item {
                height: 34px; scroll-snap-align: center;
                display: flex; align-items: center; padding: 0 10px; gap: 14px;
            }
            .vp-word { flex: 1; font-weight: 600; font-size: 0.85rem; color: #222; }
            .vp-trans { flex: 1; color: #546e7a; font-style: italic; font-size: 0.8rem; }
            .vp-item.vp-active .vp-word { color: var(--primary); }
            @media (max-width: 768px) { .row { flex-direction: column; gap: 10px; } .en { border-left: none; border-top: 1px solid #eee; padding-top: 10px; } }
        </style>
    </head>
    <body>
        <div class="header-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <small style="font-weight:bold; color:#666;">USAPODDEN | 260318 &nbsp;·&nbsp; <em style="font-weight:normal;">Personal/educational use only. Audio © respective owners. Translations under fair use.</em></small>
                <button id="modeBtn" class="btn" onclick="toggleMode()">Switch to Interleaved</button>
            </div>
            <h1 style="margin: 5px 0; font-size: 1.2rem;">Episode 724 - March 18 2026</h1>
            <div style="margin: 4px 0 8px; font-size: 0.95rem; font-weight: bold; color: var(--primary);">
                Mode: <span id="modeLabel">Podcast</span>
                <span id="audio-status" class="status-badge"></span>
            </div>
            <div class="controls">
                <div class="audio-row">
                    <audio id="audio" controls preload="metadata" src="usapodden.260318.mp3"></audio>
                </div>
                <div class="speed-row">
                    <span style="font-size: 0.7rem; font-weight: bold; color: #555;">SPEED:</span>
                    <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                    <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                    <button class="speed-btn active" id="speed-1" onclick="setSpeed(1.0)">1x</button>
                    <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                    <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                </div>
                <div class="vocab-row">
                    <button class="btn" onclick="toggleVocab()" id="vocabBtn">VOCAB ▾</button>
                </div>
                <div id="vocabPanel"><em>Loading vocabulary...</em></div>
            </div>
        </div>
        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modeBtn = document.getElementById('modeBtn');
            const modeLabel = document.getElementById('modeLabel');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "usapodden.260318.mp3", bilingual: "usapodden.260318.bilingual.mp3" };
            const startPattern = null;
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                audio.currentTime = seekTargetTime;
                initialSeekDone = true;
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (parseFloat(btn.innerText) === rate) btn.classList.add('active');
                });
            }

            function toggleMode() {
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = (mode === 'orig') ? 'bilingual' : 'orig';
                audio.src = sources[mode];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().includes(startPattern.toLowerCase()));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                modeLabel.innerText = mode === 'orig' ? 'Podcast' : 'Interleaved';
                modeBtn.innerText = mode === 'orig' ? 'Switch to Interleaved' : 'Switch to Podcast';
                modeBtn.classList.toggle('active');
            }

            checkAudioStatus();

            function toggleVocab() {
                const panel = document.getElementById('vocabPanel');
                const btn = document.getElementById('vocabBtn');
                const open = panel.style.display === 'block';
                panel.style.display = open ? 'none' : 'block';
                btn.innerText = open ? 'VOCAB ▾' : 'VOCAB ▴';
            }

            let vpAllEntries = [], vpFiltered = [], vpItems = [];

            function updateVocabInfo(e) {
                const info = document.getElementById('vocab-info');
                if (!e) { info.innerHTML = '<span class="info-sub">scroll to explore words</span>'; return; }
                if (e.cognate) {
                    info.innerHTML = `<span class="info-cognate">cognate with English: <em>${e.cognate}</em></span><span class="info-sub">${e.word} &middot; ${e.pos.toLowerCase()} &middot; &ldquo;${e.translation}&rdquo;</span>`;
                } else if (e.etymology) {
                    info.innerHTML = `<span class="info-cognate">${e.word}</span><span class="info-sub">${e.etymology}</span>`;
                } else {
                    info.innerHTML = `<span class="info-cognate">${e.word}</span><span class="info-sub">${e.translation} &middot; ${e.pos.toLowerCase()}</span>`;
                }
            }

            function renderPicker(entries) {
                const picker = document.getElementById('vocab-picker');
                picker.innerHTML = '';
                picker.appendChild(Object.assign(document.createElement('div'), { className: 'vp-spacer' }));
                vpItems = entries.map((e, i) => {
                    const item = document.createElement('div');
                    item.className = 'vp-item';
                    item.innerHTML = `<span class="vp-word">${e.word}</span><span class="vp-trans">${e.translation}</span>`;
                    picker.appendChild(item);
                    return item;
                });
                picker.appendChild(Object.assign(document.createElement('div'), { className: 'vp-spacer' }));
                let scrollTimer;
                picker.onscroll = () => {
                    clearTimeout(scrollTimer);
                    scrollTimer = setTimeout(() => {
                        const center = picker.scrollTop + picker.clientHeight / 2;
                        let closest = 0, minDist = Infinity;
                        vpItems.forEach((item, i) => {
                            const dist = Math.abs((item.offsetTop + 17) - center);
                            if (dist < minDist) { minDist = dist; closest = i; }
                        });
                        vpItems.forEach((item, i) => item.classList.toggle('vp-active', i === closest));
                        updateVocabInfo(entries[closest]);
                    }, 60);
                };
                updateVocabInfo(entries[0]);
                if (vpItems[0]) vpItems[0].classList.add('vp-active');
            }

            function buildVocabPicker(entries) {
                const panel = document.getElementById('vocabPanel');
                const posCounts = {};
                entries.forEach(e => posCounts[e.pos] = (posCounts[e.pos] || 0) + 1);
                panel.innerHTML = `
                    <div class="vocab-pos-filters" id="posFilters"></div>
                    <div id="vocab-info"><span class="info-sub">scroll to explore words</span></div>
                    <div class="vocab-picker-wrap">
                        <div class="vocab-picker-line"></div>
                        <div id="vocab-picker"></div>
                    </div>`;
                const filtersDiv = document.getElementById('posFilters');
                ['ALL', ...Object.keys(posCounts).sort()].forEach(pos => {
                    const btn = document.createElement('button');
                    btn.className = 'pos-btn' + (pos === 'ALL' ? ' active' : '');
                    btn.textContent = pos === 'ALL' ? `ALL (${entries.length})` : `${pos} (${posCounts[pos]})`;
                    btn.onclick = () => {
                        document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderPicker(pos === 'ALL' ? vpAllEntries : vpAllEntries.filter(e => e.pos === pos));
                    };
                    filtersDiv.appendChild(btn);
                });
                vpAllEntries = entries;
                renderPicker(entries);
            }

            fetch('vocab.usapodden.260318.json').then(r => r.json()).then(vocab => {
                const entries = [];
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => entries.push({ word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '' }));
                });
                entries.sort((a, b) => a.word.localeCompare(b.word));
                buildVocabPicker(entries);
            }).catch(() => {
                document.getElementById('vocabPanel').innerHTML = '<em>Vocabulary not available</em>';
            });

            fetch('transcript.usapodden.260318.json').then(r => r.json()).then(json => {
                data = json;
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = `<div class="orig">${item.orig}</div><div class="en">${item.en}</div>`;
                    row.onclick = () => {
                        audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                        audio.play();
                    };
                    container.appendChild(row);
                });
                if (startPattern !== null && data.length > 0) {
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().includes(startPattern.toLowerCase()));
                    const targetIdx = matchIdx !== -1 ? matchIdx : 0;
                    const target = data[targetIdx];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    const targetRow = document.getElementById('row-' + targetIdx);
                    if (targetRow) targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    applySeek();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                    lastIdx = currentIdx;
                }
            });
        </script>
    </body>
    </html>
