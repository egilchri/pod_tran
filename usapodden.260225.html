
    <!DOCTYPE html>
    <html lang="sv">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Trump fick bråket han ville ha</title>
        <style>
            :root {
                --primary: #004a99;
                --accent: #ffc107;
                --bg: #f0f2f5;
            }
            body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); }
            .header-box { position: sticky; top: 0; background: rgba(255,255,255,0.98); padding: 15px; border-bottom: 3px solid var(--primary); z-index: 100; backdrop-filter: blur(10px); }
            .controls { display: flex; gap: 10px; align-items: center; margin-top: 10px; background: #eee; padding: 10px; border-radius: 50px; }
            audio { flex-grow: 1; height: 40px; }
            .toggle-btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 0.8rem; white-space: nowrap; }
            .toggle-btn.active { background: var(--accent); color: black; }
            .transcript { padding: 20px; max-width: 900px; margin: 0 auto; }
            .row { display: flex; gap: 20px; padding: 15px; margin-bottom: 12px; background: white; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; }
            .row.highlight { background: #fffde7; border-left: 8px solid var(--accent); }
            .orig { flex: 1; color: var(--primary); font-weight: 700; font-size: 1.1rem; }
            .en { flex: 1; color: #546e7a; font-style: italic; border-left: 1px solid #eee; padding-left: 15px; font-size: 1.1rem; }
            @media (max-width: 768px) { .row { flex-direction: column; gap: 10px; } .en { border-left: none; border-top: 1px solid #eee; padding-top: 10px; } }
        </style>
    </head>
    <body>
        <div class="header-box">
            <small style="font-weight:bold; color:#666;">USAPODDEN | 260225</small>
            <h1 style="margin: 5px 0; font-size: 1.3rem;">Trump fick bråket han ville ha</h1>
            <div class="controls">
                <audio id="audio" controls src="usapodden.260225.mp3"></audio>
                <button id="modeBtn" class="toggle-btn" onclick="toggleMode()">🔊 Play Interleaved</button>
            </div>
        </div>
        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modeBtn = document.getElementById('modeBtn');
            const container = document.getElementById('transcript');
            const sources = { orig: "usapodden.260225.mp3", bilingual: "usapodden.260225.bilingual.mp3" };
            let mode = 'orig';
            let data = [];

            function toggleMode() {
                const isPlaying = !audio.paused;
                mode = (mode === 'orig') ? 'bilingual' : 'orig';
                audio.src = sources[mode];
                if (isPlaying) audio.play();
                modeBtn.innerText = mode === 'orig' ? '🔊 Play Interleaved' : '🌍 Play Podcast';
                modeBtn.classList.toggle('active');
            }

            fetch('transcript.usapodden.260225.json').then(r => r.json()).then(json => {
                data = json;
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = `<div class="orig">${item.orig}</div><div class="en">${item.en}</div>`;
                    row.onclick = () => { if(mode === 'orig') audio.currentTime = item.start; audio.play(); };
                    container.appendChild(row);
                });
            });

            audio.addEventListener('timeupdate', () => {
                if (mode !== 'orig') return;
                const now = audio.currentTime;
                data.forEach((item, i) => {
                    const el = document.getElementById('row-' + i);
                    if (now >= item.start && now <= item.end) {
                        el.classList.add('highlight');
                        if (!el.dataset.seen) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.dataset.seen = '1'; }
                    } else { el.classList.remove('highlight'); delete el.dataset.seen; }
                });
            });
        </script>
    </body>
    </html>
